services:
  - type: web
    name: arkan-media-tools
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_DIST
        value: /app/artifacts/media-tools/dist/public
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_COOKIES
        sync: false
